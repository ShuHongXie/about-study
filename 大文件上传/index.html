<!-- 大屏比例缩放适配 -->
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大屏比例缩放适配 Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* 页面容器 - 占满整个屏幕 */
      body,
      html {
        width: 100%;
        height: 100%;
        overflow: hidden; /* 隐藏滚动条 */
        background-color: #000;
      }

      /* 适配容器 - 核心元素 */
      .screen-adapter {
        position: absolute;
        top: 50%;
        left: 50%;
        transform-origin: left top; /* 缩放原点：左上角 */
        transition: transform 0.1s ease; /* 缩放过渡，更顺滑 */
      }

      /* 模拟大屏内容（你可以替换成自己的内容） */
      .screen-content {
        width: 1920px; /* 设计稿宽度 */
        height: 960px; /* 设计稿高度 */
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        border: 2px solid #4fc3f7;
      }

      .content-item {
        margin: 20px 0;
        text-align: center;
      }

      .scale-info {
        position: fixed;
        top: 20px;
        right: 20px;
        color: #fff;
        font-size: 16px;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <!-- 适配容器 -->
    <div class="screen-adapter" id="screen">
      <!-- 大屏内容（设计稿尺寸） -->
      <div class="screen-content">
        <div class="content-item">大屏比例缩放适配 Demo</div>
        <div class="content-item">设计稿尺寸：1920 × 960</div>
        <div class="content-item">自适应所有屏幕尺寸，保持比例不变</div>
      </div>
    </div>

    <!-- 缩放信息展示 -->
    <div class="scale-info">
      屏幕尺寸：<span id="screen-size"></span><br />
      缩放比例：<span id="scale-ratio"></span>
    </div>

    <script>
      const designDraftWidth = 1920;
      const designDraftHeight = 960;
      const screenEl = document.querySelector("#screen");
      const screenSizeEl = document.getElementById("screen-size");
      const scaleRatioEl = document.getElementById("scale-ratio");

      function handleScreenAuto() {
        const w = document.documentElement.clientWidth;
        const h = document.documentElement.clientHeight;
        const scale =
          w / h < designDraftWidth / designDraftHeight
            ? w / designDraftWidth
            : h / designDraftHeight;

        screenEl.style.transform = `scale(${scale}) translate(-50%, -50%)`;
        screenSizeEl.textContent = `${w} × ${h}`;
        scaleRatioEl.textContent = `${scale.toFixed(4)} (${(scale * 100).toFixed(2)}%)`;
      }

      handleScreenAuto();
      window.addEventListener("resize", handleScreenAuto);
      window.addEventListener("orientationchange", handleScreenAuto);
